<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LetMellModel</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <!-- ALTERE O TITULO AQUI -->
        <h1 class="hero-title">
            SEU TITULO
        </h1>

        <img src="images/hero.jpeg" alt="Hero">

    </section>

    <!-- SOBREPOSICOES -->

    <section class="stack-section">

    <div class="stack-card card-1">
        <img src="images/sobreposicao1.jpeg" alt="">
    </div>

    <div class="stack-card card-2">
        <img src="images/sobreposicao2.jpeg" alt="">
    </div>

    <div class="stack-card card-3">
        <img src="images/sobreposicao3.jpeg" alt="">
    </div>

</section>

    <!-- CARROSSEL -->

    <section class="carousel-section">

        <!-- ALTERE O TITULO DO CARROSSEL -->
        <h2>Galeria</h2>

        <div class="swiper mySwiper">

            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <img src="images/carrossel1.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="images/carrossel2.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="images/carrossel3.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="images/carrossel4.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="images/carrossel5.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="images/carrossel6.jpeg">
                </div>

            </div>

        </div>

        <div class="swipe-indicator">
    <center>⟷ </center>
    <center>Deslize para ver mais</center>
</div>

    </section>

    <!-- VIDEO -->

    <section class="video-section">

        <div class="video-wrapper">

            <video
                id="mainVideo"
                autoplay
                muted
                loop
                playsinline>

                <source
                    src="videos/video.mp4"
                    type="video/mp4">

            </video>

            <button id="muteBtn">
                🔇
            </button>

        </div>

    </section>

    <!-- GRADE -->

    <section class="gallery-grid">

        <img src="images/grade1.jpeg" alt="">
        <img src="images/grade2.jpeg" alt="">
        <img src="images/grade3.jpeg" alt="">
        <img src="images/grade4.jpeg" alt="">
        <img src="images/grade5.jpeg" alt="">

    </section>

    <!-- FINAL -->

    <section class="ending">

        <!-- ALTERE O TITULO FINAL -->
        <h2>
            ❤️
        </h2>

    </section>

    <script src="js/main.js"></script>

</body>

</html>
