<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LetMelloModel</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

</head>

<body>

    <section class="hero">

        <h1 class="hero-title">
            Book
        </h1>

        <img src="hero.jpeg" alt="Hero">

    </section>

    <section class="stack-section">

    <div class="stack-card card-1">
        <img src="sobreposicao1.jpeg" alt="">
    </div>

    <div class="stack-card card-2">
        <img src="sobreposicao2.jpeg" alt="">
    </div>

    <div class="stack-card card-3">
        <img src="sobreposicao3.jpeg" alt="">
    </div>

</section>

    <section class="carousel-section">

        <h2>Galery</h2>

        <div class="swiper mySwiper">

            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <img src="carrossel1.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="carrossel2.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="carrossel3.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="carrossel4.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="carrossel5.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="carrossel6.jpeg">
                </div>

            </div>

        </div>

        <div class="swipe-indicator">
    <center>⟷ </center>
    <center>Swipe</center>
</div>

    </section>

    <section class="video-section">

        <div class="video-wrapper">

            <video
                id="mainVideo"
                autoplay
                muted
                loop
                playsinline>

                <source
                    src="video.mp4"
                    type="video/mp4">

            </video>

            <button id="muteBtn">
                🔇
            </button>

        </div>

    </section>

    <section class="gallery-grid">

        <img src="grade1.jpeg" alt="">
        <img src="grade2.jpeg" alt="">
        <img src="grade3.jpeg" alt="">
        <img src="grade4.jpeg" alt="">
        <img src="grade5.jpeg" alt="">

    </section>

    <section class="ending">

        <h2>
           @let.mell ❤️
        </h2>

    </section>

    <script src="js/main.js"></script>

</body>

</html>
